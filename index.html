<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <!-- ===== Security Headers ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">

    <title>Engineering Exam | Secure</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        /* Light theme (default) */
        :root {
            --bg-gradient-start: #e0f2fe;
            --bg-gradient-end: #bae6fd;
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(2, 132, 199, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #0284c7;
            --accent-hover: #0ea5e9;
            --btn-gradient: linear-gradient(135deg, #0284c7, #0ea5e9);
            --success-bg: #dcfce7;
            --success-border: #22c55e;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-border: #ef4444;
            --error-text: #991b1b;
            --focus-ring: #facc15;
            --option-bg: rgba(255, 255, 255, 0.5);
            --option-hover: rgba(2, 132, 199, 0.1);
        }

        /* Dark theme */
        body.dark {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.95);
            --card-border: rgba(56, 189, 248, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --btn-gradient: linear-gradient(135deg, #0284c7, #38bdf8);
            --success-bg: #064e3b;
            --success-border: #10b981;
            --success-text: #a7f3d0;
            --error-bg: #7f1d1d;
            --error-border: #f87171;
            --error-text: #fecaca;
            --focus-ring: #facc15;
            --option-bg: rgba(255, 255, 255, 0.05);
            --option-hover: rgba(56, 189, 248, 0.2);
        }

        body {
            font-family: 'Segoe UI', system-ui, Tahoma, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            padding: 24px 16px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 30px;
        }
        .hero h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #0284c7, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid var(--card-border);
        }
        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--accent);
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background: var(--btn-gradient);
            border: none;
            color: white;
        }
        .btn-primary:hover, .btn-primary:focus-visible {
            transform: translateY(-2px);
            filter: brightness(1.03);
            outline: 3px solid var(--focus-ring);
        }
        .btn-outline {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-outline:hover, .btn-outline:focus-visible {
            background: var(--accent);
            color: white;
            outline: 3px solid var(--focus-ring);
        }
        .icon-btn {
            font-size: 1.2rem;
            padding: 6px 16px;
        }

        .filter-panel {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 18px 22px;
            margin-bottom: 28px;
            border: 1px solid var(--card-border);
        }
        .filter-row {
            margin-bottom: 16px;
        }
        .filter-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-chip {
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 18px;
            border-radius: 60px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
        }
        body.dark .filter-chip {
            background: rgba(255, 255, 255, 0.08);
        }
        .filter-chip:hover, .filter-chip:focus-visible {
            transform: translateY(-2px);
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            outline: 3px solid var(--focus-ring);
        }
        .filter-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(0.98);
        }

        .progress-section {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 6px 12px;
            margin-bottom: 25px;
        }
        .progress-bar {
            background: #cbd5e1;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0284c7, #10b981);
            border-radius: 20px;
            transition: width 0.25s;
        }

        .questions-area {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .question-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 24px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .question-card:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .q-badge {
            background: var(--accent);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }
        .q-type {
            background: #10b981;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #0f172a;
            font-weight: bold;
        }
        body.dark .q-type {
            color: #0f172a;
        }
        .q-text {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-item {
            background: var(--option-bg);
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.1s, background 0.2s, border-color 0.2s, color 0.2s;
        }
        .option-item:hover, .option-item:focus-visible {
            transform: translateX(6px);
            background: var(--option-hover);
            border-color: var(--accent);
            outline: none;
        }
        .option-prefix {
            font-weight: bold;
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .option-item.correct-answer {
            background: var(--success-bg) !important;
            border-color: var(--success-border) !important;
            color: var(--success-text) !important;
        }
        .option-item.correct-answer .option-prefix {
            background: var(--success-border);
            color: white;
        }

        .option-item.wrong-answer {
            background: var(--error-bg) !important;
            border-color: var(--error-border) !important;
            color: var(--error-text) !important;
        }
        .option-item.wrong-answer .option-prefix {
            background: var(--error-border);
            color: white;
        }

        .option-item.disabled-option {
            pointer-events: none;
            opacity: 0.8;
        }

        .feedback {
            display: none;
            margin-top: 15px;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            color: var(--text-primary);
        }
        .feedback.correct {
            display: block;
            background: var(--success-bg);
            border-left-color: var(--success-border);
            color: var(--success-text);
        }
        .feedback.wrong {
            display: block;
            background: var(--error-bg);
            border-left-color: var(--error-border);
            color: var(--error-text);
        }

        .essay-area textarea, .report-area textarea {
            width: 100%;
            background: var(--option-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 12px;
            color: var(--text-primary);
            font-family: inherit;
            margin: 10px 0;
        }
        .small-btn {
            background: transparent;
            border: 1px solid var(--accent);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 6px;
            transition: 0.1s;
            color: var(--text-primary);
        }
        .small-btn:hover {
            background: var(--accent);
            color: white;
        }
        .model-answer {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: rgba(2, 132, 199, 0.1);
            border-radius: 20px;
        }
        .rubric {
            font-size: 0.8rem;
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(2, 132, 199, 0.1);
            border-radius: 12px;
        }

        .submit-exam-wrapper {
            text-align: center;
            margin: 35px 0 20px;
        }
        .btn-large {
            padding: 14px 36px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #10b981, #0284c7);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        .btn-large:hover, .btn-large:focus-visible {
            transform: scale(1.02);
            outline: 3px solid var(--focus-ring);
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .result-card {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            border-radius: 36px;
            padding: 28px;
            border: 1px solid var(--accent);
            max-height: 90vh;
            overflow-y: auto;
        }
        .score-circle {
            width: 130px;
            height: 130px;
            margin: 20px auto;
            background: linear-gradient(135deg, #0284c7, #10b981);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            color: white;
        }
        .mistake-item {
            background: rgba(239, 68, 68, 0.1);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--card-border);
            padding-top: 20px;
        }
        .footer-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link:hover {
            text-decoration: underline;
        }

        #loadStatus {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 650px) {
            .toolbar { gap: 8px; }
            .btn { padding: 6px 14px; }
            footer { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>⚙️ Engineering Interactive Exam</h1>
    </div>

    <div class="toolbar">
        <button class="btn btn-primary" id="newExamBtn">🔄 New Exam</button>
        <div style="display: flex; gap: 6px;">
            <button class="btn icon-btn" id="darkModeBtn">🌙</button>
            <button class="btn icon-btn" id="lightModeBtn">☀️</button>
        </div>
    </div>

    <div class="filter-panel">
        <div class="filter-row">
            <div class="filter-title">📂 Filter by Topic</div>
            <div class="filter-buttons" id="categoryFilters"></div>
        </div>
        <div class="filter-row">
            <div class="filter-title">📝 Filter by Type</div>
            <div class="filter-buttons" id="typeFilters"></div>
        </div>
        <div>
            <button class="btn" id="resetFiltersBtn" style="font-size:0.7rem;">🗑️ Reset Filters</button>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="loadStatus" style="text-align:center; padding:20px; font-size:0.9rem;"></div>
    <div id="questionsArea" class="questions-area"></div>

    <div class="submit-exam-wrapper">
        <button class="btn-large" id="submitExamBtn">📊 Submit Exam & Evaluate</button>
    </div>

    <footer>
        Designed and developed by 
        <a href="https://www.linkedin.com/in/ahmed-mohammed-ahmed-saber-abdelhamid-b46249324" target="_blank" rel="noopener noreferrer" class="footer-link">
            Ahmed Al-Sayad
        </a> 
        © 2026 All rights reserved
    </footer>
</div>

<div id="resultModal" class="result-modal">
    <div class="result-card">
        <h2 style="text-align:center;">📋 Your Score</h2>
        <div class="score-circle" id="scorePercent">0%</div>
        <p id="scoreMsg" style="text-align:center; margin:10px 0;"></p>
        <div id="mistakesList"></div>
        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
            <button class="btn btn-primary" id="closeResultBtn">Close</button>
            <button class="btn" id="newExamFromResultBtn">New Exam</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  SECURITY: Enhanced escapeHtml – prevents XSS completely
    // ============================================================
    function escapeHtml(str) {
        if (typeof str !== 'string') return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // ============================================================
    //  SECURITY: Input Validation
    // ============================================================
    function validateInput(input, type) {
        const validators = {
            text: (v) => typeof v === 'string' && v.length <= 5000,
            number: (v) => Number.isInteger(v) && v >= 0 && v <= 100,
            category: (v) => ['all', 'Grammar', 'CV', 'Motivation', 'Recommendation',
                'Intro', 'Structure', 'Style', 'Mistakes', 'Exam',
                'Clauses', 'Comprehension', 'Writing', 'Technical', 'General',
                'IEEE', 'Methodology', 'Implementation', 'Discussion', 'Visualization',
                'IoT', 'Renewable', 'Robotics', 'Control', 'Literature'].includes(v),
            type: (v) => ['all', 'mcq', 'essay', 'report', 'tf'].includes(v)
        };
        return validators[type] ? validators[type](input) : false;
    }

    // ============================================================
    //  SECURITY: Rate Limiter (frontend)
    // ============================================================
    class RateLimiter {
        constructor(maxRequests = 5, windowMs = 60000) {
            this.requests = [];
            this.maxRequests = maxRequests;
            this.windowMs = windowMs;
        }
        canProceed() {
            const now = Date.now();
            this.requests = this.requests.filter(t => now - t < this.windowMs);
            if (this.requests.length >= this.maxRequests) return false;
            this.requests.push(now);
            return true;
        }
    }
    const examRateLimiter = new RateLimiter(5, 60000);

    // ============================================================
    //  CONFIG
    // ============================================================
    const CONFIG = {
        maxQuestionsPerExam: 15,
        version: "3.0"
    };

    // ============================================================
    //  STATE
    // ============================================================
    let isDark = false;
    let allQuestions = [];
    let currentExamQuestions = [];
    let userAnswers = {};
    let filterCategory = "all";
    let filterType = "all";

    // ============================================================
    //  HELPERS
    // ============================================================
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function updateProgress() {
        let answered = 0;
        currentExamQuestions.forEach(q => {
            const ans = userAnswers[q.id];
            if (ans && (ans.answered || (ans.userText && ans.userText.trim()))) answered++;
        });
        const fill = document.getElementById("progressFill");
        if (fill) fill.style.width = (currentExamQuestions.length ? (answered / currentExamQuestions.length) * 100 : 0) + "%";
    }

    // ============================================================
    //  FETCH QUESTIONS from questions.json
    // ============================================================
    async function loadQuestions() {
        const statusEl = document.getElementById("loadStatus");
        statusEl.textContent = "⏳ Loading question bank...";
        try {
            const res = await fetch('questions.json', { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP ${res.status} while fetching questions.json`);
            const data = await res.json();
            allQuestions = data.questions || [];
            statusEl.textContent = "";
            buildFilters();
            refreshExam();
        } catch (err) {
            console.error('Failed to load questions:', err);
            statusEl.innerHTML = "⚠️ Could not load the question bank (questions.json). " +
                "Make sure index.html and questions.json are in the same folder and the site is served over http(s) " +
                "(opening index.html directly via file:// blocks fetch() in most browsers). " +
                `<br><button class="btn" id="retryLoadBtn" style="margin-top:10px;">🔄 Retry</button>`;
            const retryBtn = document.getElementById("retryLoadBtn");
            if (retryBtn) retryBtn.addEventListener("click", loadQuestions);
        }
    }

    // ============================================================
    //  RENDER
    // ============================================================
    function renderQuestions() {
        const area = document.getElementById("questionsArea");
        if (!currentExamQuestions.length) {
            area.innerHTML = "<div style='text-align:center;padding:40px;'>No questions match filters.</div>";
            return;
        }
        let html = "";
        currentExamQuestions.forEach((q, idx) => {
            const saved = userAnswers[q.id];
            const answered = saved && (saved.answered || (saved.userText && saved.userText.trim()));
            const isChoiceType = (q.type === "mcq" || q.type === "tf");
            let typeLabel = q.type === "mcq" ? "MCQ" : (q.type === "tf" ? "True/False" : (q.type === "essay" ? "Essay" : "Report"));

            html += `<div class="question-card" data-qid="${q.id}">
                        <div class="q-header">
                            <span class="q-badge">Question ${idx+1}</span>
                            <span class="q-type">${typeLabel}</span>
                            ${answered ? '<span style="color:#10b981;">✓ Answered</span>' : ''}
                        </div>
                        <div class="q-text">${escapeHtml(q.question)}</div>`;

            if (isChoiceType) {
                const opts = q.type === "tf" ? ["True", "False"] : q.options;
                html += `<div class="options-list" data-qid="${q.id}">`;
                opts.forEach((opt, optIdx) => {
                    const letter = String.fromCharCode(65 + optIdx);
                    const isCorrectChoice = (saved && saved.selectedOption === optIdx && saved.correct === true);
                    const isWrongChoice = (saved && saved.selectedOption === optIdx && saved.correct === false);
                    let extraClass = "";
                    if (isCorrectChoice) extraClass = "correct-answer";
                    if (isWrongChoice) extraClass = "wrong-answer";
                    html += `<div class="option-item ${extraClass}" data-opt="${optIdx}" tabindex="0" role="button">
                                <span class="option-prefix">${letter}</span>
                                <span>${escapeHtml(opt)}</span>
                            </div>`;
                });
                html += `</div><div class="feedback" id="fb-${q.id}"></div>`;
            } else {
                const savedText = saved?.userText || "";
                html += `<div class="${q.type === 'essay' ? 'essay-area' : 'report-area'}">
                            <textarea id="ta-${q.id}" rows="4" placeholder="Write your answer here..." tabindex="0">${escapeHtml(savedText)}</textarea>
                            <button class="small-btn show-model" data-qid="${q.id}" tabindex="0">📖 Show Model Answer</button>
                            <div class="model-answer" id="model-${q.id}">${escapeHtml(q.answer || "Refer to academic resources.")}</div>
                            ${q.rubric ? `<div class="rubric">📋 Self-assessment rubric: ${escapeHtml(q.rubric)}</div>` : ''}
                            <button class="small-btn eval-essay" data-qid="${q.id}" tabindex="0">🔍 Self Evaluate (keywords)</button>
                            <div class="feedback" id="kf-${q.id}" style="margin-top:6px;"></div>
                        </div>`;
            }
            html += `</div>`;
        });
        area.innerHTML = html;
        attachEvents();
        attachKeyboardSelection();
    }

    // ============================================================
    //  EVENT HANDLING
    // ============================================================
    function attachEvents() {
        document.querySelectorAll(".options-list").forEach(optList => {
            const qid = parseInt(optList.getAttribute("data-qid"));
            const q = currentExamQuestions.find(qq => qq.id === qid);
            if (!q || (q.type !== "mcq" && q.type !== "tf")) return;
            const opts = optList.querySelectorAll(".option-item");
            opts.forEach(opt => {
                opt.removeEventListener("click", handleClick);
                opt.addEventListener("click", handleClick);
                function handleClick() {
                    if (userAnswers[qid]?.answered) return;
                    const selectedVal = parseInt(opt.getAttribute("data-opt"));
                    const isCorrect = (selectedVal === q.correct);
                    userAnswers[qid] = { answered: true, correct: isCorrect, selectedOption: selectedVal };
                    opts.forEach(oth => {
                        const val = parseInt(oth.getAttribute("data-opt"));
                        if (val === q.correct) oth.classList.add("correct-answer");
                        else if (val === selectedVal && !isCorrect) oth.classList.add("wrong-answer");
                        oth.style.pointerEvents = "none";
                        oth.classList.add("disabled-option");
                    });
                    const fb = document.getElementById(`fb-${qid}`);
                    if (fb) {
                        const correctAns = q.type === "tf" ? (q.correct === 0 ? "True" : "False") : q.options[q.correct];
                        fb.innerHTML = `<div>📘 ${escapeHtml(q.explanation || '')} ✅ Correct answer: ${escapeHtml(correctAns)}</div>`;
                        fb.classList.add(isCorrect ? "correct" : "wrong");
                    }
                    const card = opt.closest(".question-card");
                    const span = card.querySelector(".q-header span:last-child");
                    if (span) span.innerHTML = isCorrect ? "✓ Correct" : "✓ Answered";
                    updateProgress();
                }
            });
        });

        document.querySelectorAll("textarea").forEach(ta => {
            const qid = parseInt(ta.id.split("-")[1]);
            ta.addEventListener("input", (e) => {
                if (!userAnswers[qid]) userAnswers[qid] = {};
                userAnswers[qid].userText = e.target.value;
                updateProgress();
            });
        });

        document.querySelectorAll(".show-model").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const qid = parseInt(btn.getAttribute("data-qid"));
                const modelDiv = document.getElementById(`model-${qid}`);
                if (modelDiv) modelDiv.style.display = modelDiv.style.display === "none" ? "block" : "none";
            });
        });

        document.querySelectorAll(".eval-essay").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const qid = parseInt(btn.getAttribute("data-qid"));
                const ta = document.getElementById(`ta-${qid}`);
                const userText = ta?.value || "";
                const q = currentExamQuestions.find(qq => qq.id === qid);
                if (!q || (q.type !== "essay" && q.type !== "report")) return;
                let keywords = (q.answer || "").toLowerCase().split(/[ ,.]+/).filter(w => w.length > 3);
                const unique = [...new Set(keywords)];
                const found = unique.filter(kw => userText.toLowerCase().includes(kw));
                const percent = unique.length ? Math.round((found.length / unique.length) * 100) : 0;
                const fbDiv = document.getElementById(`kf-${qid}`);
                if (fbDiv) {
                    if (percent > 60) fbDiv.innerHTML = `✅ Keyword match: ${percent}% – Good.`;
                    else if (percent > 30) fbDiv.innerHTML = `⚠️ Match ${percent}%, add details.`;
                    else fbDiv.innerHTML = `❌ Low coverage. Important words: ${unique.slice(0,5).join(", ")}...`;
                    fbDiv.classList.add(percent > 50 ? "correct" : "wrong");
                }
            });
        });
    }

    function attachKeyboardSelection() {
        document.querySelectorAll(".option-item").forEach(opt => {
            opt.setAttribute("tabindex", "0");
            opt.addEventListener("keydown", (e) => {
                if (e.key === "Enter" || e.key === " ") { e.preventDefault(); opt.click(); }
            });
        });
    }

    // ============================================================
    //  EVALUATE EXAM
    // ============================================================
    function evaluateExam() {
        if (!examRateLimiter.canProceed()) {
            alert("⏳ Too many exam submissions. Please wait a minute.");
            return;
        }
        let totalMCQ = 0, correctMCQ = 0;
        const mistakes = [];
        for (let q of currentExamQuestions) {
            if (q.type === "mcq" || q.type === "tf") {
                totalMCQ++;
                const ans = userAnswers[q.id];
                if (ans && ans.correct === true) correctMCQ++;
                else {
                    let userChoice = ans ? (q.type === "tf" ? (ans.selectedOption === 0 ? "True" : "False") : q.options[ans.selectedOption]) : "Not answered";
                    const correctAns = q.type === "tf" ? (q.correct === 0 ? "True" : "False") : q.options[q.correct];
                    mistakes.push({ question: q.question, userChoice, correctAnswer: correctAns, explanation: q.explanation || '' });
                }
            }
        }
        const score = totalMCQ ? Math.round((correctMCQ / totalMCQ) * 100) : 0;
        document.getElementById("scorePercent").innerHTML = `${score}%`;
        let msg = (score >= 85) ? "🎉 Excellent!" : (score >= 65) ? "👍 Good, review mistakes." : "📚 Need more revision.";
        document.getElementById("scoreMsg").innerHTML = `Score: ${correctMCQ} / ${totalMCQ} (${score}%)<br>${msg}`;
        let mistakesHtml = "";
        if (mistakes.length) {
            mistakesHtml = `<h4>❌ Mistakes (${mistakes.length})</h4>`;
            mistakes.forEach(m => {
                mistakesHtml += `<div class="mistake-item"><strong>${escapeHtml(m.question)}</strong><br>Your answer: ${escapeHtml(m.userChoice)}<br>Correct: ${escapeHtml(m.correctAnswer)}<br><span style="font-size:0.8rem;">${escapeHtml(m.explanation)}</span></div>`;
            });
        } else {
            mistakesHtml = `<p style="color:#10b981;">✨ No mistakes! Perfect.</p>`;
        }
        document.getElementById("mistakesList").innerHTML = mistakesHtml;
        document.getElementById("resultModal").style.display = "flex";
    }

    // ============================================================
    //  FILTERS
    // ============================================================
    function buildFilters() {
        const cats = [...new Set(allQuestions.map(q => q.category))];
        const catContainer = document.getElementById("categoryFilters");
        catContainer.innerHTML = `<button class="filter-chip ${filterCategory === 'all' ? 'active' : ''}" data-cat="all">All</button>`;
        cats.forEach(c => {
            catContainer.innerHTML += `<button class="filter-chip ${filterCategory === c ? 'active' : ''}" data-cat="${c}">${c}</button>`;
        });
        const types = ["all", "mcq", "tf", "essay", "report"];
        const typeContainer = document.getElementById("typeFilters");
        typeContainer.innerHTML = "";
        types.forEach(t => {
            let label = t === "all" ? "All" : (t === "mcq" ? "MCQ" : (t === "tf" ? "True/False" : (t === "essay" ? "Essay" : "Report")));
            typeContainer.innerHTML += `<button class="filter-chip ${filterType === t ? 'active' : ''}" data-type="${t}">${label}</button>`;
        });
        document.querySelectorAll("[data-cat]").forEach(btn => {
            btn.addEventListener("click", () => {
                filterCategory = btn.getAttribute("data-cat");
                buildFilters();
                refreshExam();
            });
        });
        document.querySelectorAll("[data-type]").forEach(btn => {
            btn.addEventListener("click", () => {
                filterType = btn.getAttribute("data-type");
                buildFilters();
                refreshExam();
            });
        });
    }

    function resetFilters() {
        filterCategory = "all";
        filterType = "all";
        buildFilters();
        refreshExam();
    }

    // ============================================================
    //  REFRESH EXAM
    // ============================================================
    function refreshExam() {
        if (allQuestions.length === 0) return;
        let pool = allQuestions.filter(q =>
            (filterCategory === "all" || q.category === filterCategory) &&
            (filterType === "all" || q.type === filterType)
        );
        if (pool.length === 0) pool = allQuestions;
        currentExamQuestions = shuffle([...pool]).slice(0, CONFIG.maxQuestionsPerExam);
        userAnswers = {};
        renderQuestions();
        updateProgress();
        document.getElementById("resultModal").style.display = "none";
    }

    // ============================================================
    //  THEME
    // ============================================================
    function setTheme(dark) {
        isDark = dark;
        if (dark) document.body.classList.add("dark");
        else document.body.classList.remove("dark");
    }

    // ============================================================
    //  INIT
    // ============================================================
    document.getElementById("newExamBtn").onclick = () => refreshExam();
    document.getElementById("submitExamBtn").onclick = () => evaluateExam();
    document.getElementById("resetFiltersBtn").onclick = () => resetFilters();
    document.getElementById("closeResultBtn").onclick = () => document.getElementById("resultModal").style.display = "none";
    document.getElementById("newExamFromResultBtn").onclick = () => { document.getElementById("resultModal").style.display = "none"; refreshExam(); };
    document.getElementById("darkModeBtn").onclick = () => setTheme(true);
    document.getElementById("lightModeBtn").onclick = () => setTheme(false);

    setTheme(false);
    loadQuestions();
</script>
</body>
</html>
