<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Engineering Exam | Smart Feedback | Dark/Light Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        /* Light theme (default) */
        :root {
            --bg-gradient-start: #e0f2fe;
            --bg-gradient-end: #bae6fd;
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(2, 132, 199, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #0284c7;
            --accent-hover: #0ea5e9;
            --btn-gradient: linear-gradient(135deg, #0284c7, #0ea5e9);
            --success-bg: #dcfce7;
            --success-border: #22c55e;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-border: #ef4444;
            --error-text: #991b1b;
            --focus-ring: #facc15;
            --option-bg: rgba(255, 255, 255, 0.5);
            --option-hover: rgba(2, 132, 199, 0.1);
        }

        /* Dark theme */
        body.dark {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.95);
            --card-border: rgba(56, 189, 248, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --btn-gradient: linear-gradient(135deg, #0284c7, #38bdf8);
            --success-bg: #064e3b;
            --success-border: #10b981;
            --success-text: #a7f3d0;
            --error-bg: #7f1d1d;
            --error-border: #f87171;
            --error-text: #fecaca;
            --focus-ring: #facc15;
            --option-bg: rgba(255, 255, 255, 0.05);
            --option-hover: rgba(56, 189, 248, 0.2);
        }

        body {
            font-family: 'Segoe UI', system-ui, Tahoma, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            padding: 24px 16px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 30px;
        }
        .hero h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #0284c7, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid var(--card-border);
        }
        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--accent);
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background: var(--btn-gradient);
            border: none;
            color: white;
        }
        .btn-primary:hover, .btn-primary:focus-visible {
            transform: translateY(-2px);
            filter: brightness(1.03);
            outline: 3px solid var(--focus-ring);
        }
        .btn-outline {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-outline:hover, .btn-outline:focus-visible {
            background: var(--accent);
            color: white;
            outline: 3px solid var(--focus-ring);
        }
        .icon-btn {
            font-size: 1.2rem;
            padding: 6px 16px;
        }

        .filter-panel {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 18px 22px;
            margin-bottom: 28px;
            border: 1px solid var(--card-border);
        }
        .filter-row {
            margin-bottom: 16px;
        }
        .filter-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-chip {
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 18px;
            border-radius: 60px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
        }
        body.dark .filter-chip {
            background: rgba(255, 255, 255, 0.08);
        }
        .filter-chip:hover, .filter-chip:focus-visible {
            transform: translateY(-2px);
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            outline: 3px solid var(--focus-ring);
        }
        .filter-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(0.98);
        }

        .progress-section {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 6px 12px;
            margin-bottom: 25px;
        }
        .progress-bar {
            background: #cbd5e1;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0284c7, #10b981);
            border-radius: 20px;
            transition: width 0.25s;
        }

        .questions-area {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .question-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 24px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .question-card:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .q-badge {
            background: var(--accent);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }
        .q-type {
            background: #10b981;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #0f172a;
            font-weight: bold;
        }
        body.dark .q-type {
            color: #0f172a;
        }
        .q-text {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-item {
            background: var(--option-bg);
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.1s, background 0.2s, border-color 0.2s, color 0.2s;
        }
        .option-item:hover, .option-item:focus-visible {
            transform: translateX(6px);
            background: var(--option-hover);
            border-color: var(--accent);
            outline: none;
        }
        .option-prefix {
            font-weight: bold;
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .option-item.correct-answer {
            background: var(--success-bg) !important;
            border-color: var(--success-border) !important;
            color: var(--success-text) !important;
        }
        .option-item.correct-answer .option-prefix {
            background: var(--success-border);
            color: white;
        }

        .option-item.wrong-answer {
            background: var(--error-bg) !important;
            border-color: var(--error-border) !important;
            color: var(--error-text) !important;
        }
        .option-item.wrong-answer .option-prefix {
            background: var(--error-border);
            color: white;
        }

        .option-item.disabled-option {
            pointer-events: none;
            opacity: 0.8;
        }

        .feedback {
            display: none;
            margin-top: 15px;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            color: var(--text-primary);
        }
        .feedback.correct {
            display: block;
            background: var(--success-bg);
            border-left-color: var(--success-border);
            color: var(--success-text);
        }
        .feedback.wrong {
            display: block;
            background: var(--error-bg);
            border-left-color: var(--error-border);
            color: var(--error-text);
        }

        .essay-area textarea, .report-area textarea {
            width: 100%;
            background: var(--option-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 12px;
            color: var(--text-primary);
            font-family: inherit;
            margin: 10px 0;
        }
        .small-btn {
            background: transparent;
            border: 1px solid var(--accent);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 6px;
            transition: 0.1s;
            color: var(--text-primary);
        }
        .small-btn:hover {
            background: var(--accent);
            color: white;
        }
        .model-answer {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: rgba(2, 132, 199, 0.1);
            border-radius: 20px;
        }
        .rubric {
            font-size: 0.8rem;
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(2, 132, 199, 0.1);
            border-radius: 12px;
        }

        .submit-exam-wrapper {
            text-align: center;
            margin: 35px 0 20px;
        }
        .btn-large {
            padding: 14px 36px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #10b981, #0284c7);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        .btn-large:hover, .btn-large:focus-visible {
            transform: scale(1.02);
            outline: 3px solid var(--focus-ring);
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .result-card {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            border-radius: 36px;
            padding: 28px;
            border: 1px solid var(--accent);
            max-height: 90vh;
            overflow-y: auto;
        }
        .score-circle {
            width: 130px;
            height: 130px;
            margin: 20px auto;
            background: linear-gradient(135deg, #0284c7, #10b981);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            color: white;
        }
        .mistake-item {
            background: rgba(239, 68, 68, 0.1);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--card-border);
            padding-top: 20px;
        }
        .footer-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 650px) {
            .toolbar { gap: 8px; }
            .btn { padding: 6px 14px; }
            footer { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>⚙️ Engineering Interactive Exam</h1>
    </div>

    <div class="toolbar">
        <button class="btn btn-primary" id="newExamBtn">🔄 New Exam</button>
        <div style="display: flex; gap: 6px;">
            <button class="btn icon-btn" id="darkModeBtn">🌙</button>
            <button class="btn icon-btn" id="lightModeBtn">☀️</button>
        </div>
    </div>

    <div class="filter-panel">
        <div class="filter-row">
            <div class="filter-title">📂 Filter by Topic</div>
            <div class="filter-buttons" id="categoryFilters"></div>
        </div>
        <div class="filter-row">
            <div class="filter-title">📝 Filter by Type</div>
            <div class="filter-buttons" id="typeFilters"></div>
        </div>
        <div>
            <button class="btn" id="resetFiltersBtn" style="font-size:0.7rem;">🗑️ Reset Filters</button>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="questionsArea" class="questions-area"></div>

    <div class="submit-exam-wrapper">
        <button class="btn-large" id="submitExamBtn">📊 Submit Exam & Evaluate</button>
    </div>

    <footer>
        Designed and developed by 
        <a href="https://www.linkedin.com/in/ahmed-mohammed-ahmed-saber-abdelhamid-b46249324" target="_blank" rel="noopener noreferrer" class="footer-link">
            Ahmed Al-Sayad
        </a> 
        © 2026 All rights reserved
    </footer>
</div>

<div id="resultModal" class="result-modal">
    <div class="result-card">
        <h2 style="text-align:center;">📋 Your Score</h2>
        <div class="score-circle" id="scorePercent">0%</div>
        <p id="scoreMsg" style="text-align:center; margin:10px 0;"></p>
        <div id="mistakesList"></div>
        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
            <button class="btn btn-primary" id="closeResultBtn">Close</button>
            <button class="btn" id="newExamFromResultBtn">New Exam</button>
        </div>
    </div>
</div>

<script>
    // ======================== FULL QUESTION BANK (112 UNIQUE QUESTIONS) ========================
    const FULL_BANK = [
        // ====== ORIGINAL QUESTIONS (94) ======
        { id: 1, category: "Grammar", type: "mcq", question: "Some engineers ____________ many design specifications.", options: ["give", "gives", "are give", "is give"], correct: 0, explanation: "Plural subject → 'give'." },
        { id: 2, category: "Grammar", type: "mcq", question: "Taylor and Adam _______________ expert troubleshooters.", options: ["be", "is", "are", "does"], correct: 2, explanation: "Compound subject → 'are'." },
        { id: 3, category: "Grammar", type: "mcq", question: "____________ your colleagues analyze stress factors accurately.", options: ["Are", "Does", "Do", "Is"], correct: 2, explanation: "'Do' with plural subject." },
        { id: 4, category: "Grammar", type: "mcq", question: "How many CAD models ________ your team create this month?", options: ["are", "were", "did", "do"], correct: 2, explanation: "Past simple with 'did'." },
        { id: 5, category: "Grammar", type: "mcq", question: "He is skilled in programming, but he _____________ work on this project now.", options: ["isn't", "wasn't", "doesn't", "don't"], correct: 2, explanation: "'doesn't' with 'he'." },
        { id: 6, category: "Grammar", type: "mcq", question: "He has been explaining the algorithm for hours, but I __ grasp it.", options: ["don't", "wasn't", "isn't", "am not"], correct: 0, explanation: "'I don't'." },
        { id: 7, category: "Grammar", type: "mcq", question: "How often ______ you conduct safety inspections in your department?", options: ["are", "do", "was", "does"], correct: 1, explanation: "'Do you'." },
        { id: 8, category: "Grammar", type: "mcq", question: "She ___________ enjoy attending engineering conferences. So, she ___________ attends them regularly.", options: ["doesn't / always", "doesn't / never", "isn't / never", "isn't / hardly ever"], correct: 0, explanation: "doesn't enjoy / always attends." },
        { id: 9, category: "Grammar", type: "mcq", question: "None of my colleagues ________ neglects safety protocols.", options: ["doesn't", "does", "never", "isn't"], correct: 1, explanation: "'does' as singular verb." },
        { id: 10, category: "Grammar", type: "mcq", question: "How many engineers in your team ________ coding?", options: ["knows", "are knowing", "does know", "know"], correct: 3, explanation: "Plural → 'know'." },
        { id: 11, category: "Grammar", type: "mcq", question: "How often ______ you conduct safety inspections?", options: ["are", "got", "do", "is"], correct: 2, explanation: "'do you'." },
        { id: 12, category: "Grammar", type: "mcq", question: "We ________ our equipment after every operation.", options: ["clean", "are clean", "cleaning", "cleans"], correct: 0, explanation: "'We clean'." },
        { id: 13, category: "Grammar", type: "mcq", question: "My team ___________ work overtime during project deadlines.", options: ["isn't", "doesn't", "don't", "aren't"], correct: 1, explanation: "'team' singular → 'doesn't'." },
        { id: 14, category: "Grammar", type: "mcq", question: "Our experiments ___________ at precisely scheduled times.", options: ["starts", "starting", "are start", "start"], correct: 3, explanation: "'experiments' plural → 'start'." },
        { id: 15, category: "CV", type: "mcq", question: "In an engineering CV, what should be included in the 'Contact Information' section?", options: ["Full name, email, phone, LinkedIn, portfolio", "Only name and email", "Home address and age", "Social media usernames"], correct: 0, explanation: "Professional details." },
        { id: 16, category: "CV", type: "mcq", question: "Which bullet point is the STRONGEST for an engineering CV using STAR?", options: ["Worked on improving cooling system", "Responsible for designing a bridge", "Redesigned HVAC cycle using SolidWorks, reducing energy by 15%", "Helped write lab safety documents"], correct: 2, explanation: "Action verb + tool + quantifiable result." },
        { id: 17, category: "Motivation", type: "mcq", question: "What is the purpose of 'Body Paragraph 2' in a motivation letter?", options: ["Demonstrate research about the company", "List all technical skills", "Repeat CV", "Ask salary"], correct: 0, explanation: "Shows you've researched the company." },
        { id: 18, category: "Recommendation", type: "mcq", question: "A professional recommendation letter should be written by:", options: ["Former manager", "Family member", "Friend", "Classmate"], correct: 0, explanation: "Former supervisor or manager." },
        { id: 19, category: "Grammar", type: "mcq", question: "We used ___ IEEE referencing style for our report.", options: ["a", "an", "the", "no article"], correct: 1, explanation: "'an IEEE' (vowel sound)." },
        { id: 20, category: "Grammar", type: "mcq", question: "___ unique hardware configuration was required.", options: ["A", "An", "The", "Some"], correct: 0, explanation: "'a unique' (y sound)." },
        { id: 21, category: "Grammar", type: "mcq", question: "Please refer to ___ oscilloscope on the workbench.", options: ["a", "an", "the", "any"], correct: 2, explanation: "Specific → 'the'." },
        { id: 22, category: "Grammar", type: "mcq", question: "It takes ___ hour to complete the simulation.", options: ["a", "an", "the", "no article"], correct: 1, explanation: "'an hour'." },
        { id: 23, category: "Intro", type: "mcq", question: "The purpose of a preamble is to ___ the study.", options: ["conclude", "set the tone", "cite sources", "list data"], correct: 1, explanation: "Sets the tone and context." },
        { id: 24, category: "Intro", type: "mcq", question: "Which section clarifies what a study will NOT cover?", options: ["Background", "Scope", "Limitations", "Problem Statement"], correct: 2, explanation: "Limitations." },
        { id: 25, category: "Intro", type: "mcq", question: "A problem statement must be technically ___.", options: ["vague", "emotional", "grounded", "optional"], correct: 2, explanation: "Objective and fact-based." },
        { id: 26, category: "Clauses", type: "mcq", question: "Identify the clause type: We must determine 'why the system rebooted'.", options: ["Noun Clause", "Adjective Clause", "Adverb Clause", "Independent Clause"], correct: 0, explanation: "Noun clause as object." },
        { id: 27, category: "Clauses", type: "mcq", question: "Identify the clause type: The engineer 'who calibrated the device' ensured accuracy.", options: ["Verb", "Noun", "Adjective", "Adverb"], correct: 2, explanation: "Adjective clause modifying 'engineer'." },
        { id: 28, category: "Comprehension", type: "mcq", question: "Which section establishes context?", options: ["Background", "Sampling", "Data Analysis", "Architecture"], correct: 0, explanation: "Background section." },
        { id: 29, category: "Comprehension", type: "mcq", question: "A clear statement of the research question is the ___?", options: ["Literature Review", "Significance", "Problem Statement", "Methodology"], correct: 2, explanation: "Problem Statement." },
        { id: 30, category: "Comprehension", type: "mcq", question: "Boundaries of the study (what it will not cover) are found in ___?", options: ["Ethics", "Scope and Limitations", "Research Design", "Data Analysis"], correct: 1, explanation: "Scope and Limitations." },
        { id: 31, category: "Writing", type: "essay", question: "Explain the difference between active and passive voice in technical writing.", answer: "Active voice emphasizes the subject performing the action; passive voice emphasizes the action itself." },
        { id: 32, category: "Writing", type: "essay", question: "What is the STAR method and how does it improve an engineering CV?", answer: "Situation, Task, Action, Result. It quantifies achievements." },
        { id: 33, category: "Technical", type: "report", question: "Write a short technical report (Introduction + Methodology) for a 'Smart Temperature Monitoring System'.", answer: "Introduction: background, problem. Methodology: sensors, Arduino, validation.", rubric: "Clarity 30%, depth 40%, structure 30%" },
        { id: 34, category: "Technical", type: "report", question: "Write an introduction chapter for a project 'Designing a 3-bit ALU using logic gates'.", answer: "ALU core of CPU, delay problem, aim to design fast 3-bit ALU.", rubric: "Technical 40%, clarity 30%" }
    ];

    // إضافة أسئلة إضافية متنوعة (حتى 94)
    for (let i = 35; i <= 94; i++) {
        if (i % 3 === 0) FULL_BANK.push({ id: i, category: "Technical", type: "essay", question: "Discuss impact of IoT on industrial automation.", answer: "IoT enables real-time monitoring and predictive maintenance." });
        else if (i % 3 === 1) FULL_BANK.push({ id: i, category: "General", type: "mcq", question: "Which component stores electrical charge?", options: ["Resistor", "Inductor", "Capacitor", "Diode"], correct: 2, explanation: "Capacitor stores energy." });
        else FULL_BANK.push({ id: i, category: "General", type: "mcq", question: "What does CPU stand for?", options: ["Central Processing Unit", "Computer Personal Unit", "Central Program Unit", "Control Processing Unit"], correct: 0, explanation: "Central Processing Unit." });
    }

    // ====== أسئلة من ملف Model Answer Mid TW 26.html (18 سؤالاً) ======
    // القسم A - أسئلة مقالية (3)
    FULL_BANK.push({
        id: 95,
        category: "Exam",
        type: "essay",
        question: "What are the main chapters that the technical report for research should contain?",
        answer: "A typical technical research report usually includes the following chapters:\n1. Title Page\n2. Abstract\n3. Introduction\n4. Literature Review / Background\n5. Methodology\n6. Implementation\n7. Results / Findings\n8. Discussion, conclusion, and recommendations\n9. References\n10. Appendices (if needed)"
    });
    FULL_BANK.push({

    // ====== نهاية بنك الأسئلة (112 سؤالاً) ======

    let isDark = false;
    let currentExamQuestions = [];
    let userAnswers = {};
    let filterCategory = "all";
    let filterType = "all";

    function shuffle(arr) { for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function getFilteredPool() {
        let pool = FULL_BANK.filter(q => (filterCategory==="all" || q.category===filterCategory) && (filterType==="all" || q.type===filterType));
        if(pool.length===0) pool = [...FULL_BANK];
        return shuffle([...pool]);
    }
    function refreshExam() {
        currentExamQuestions = getFilteredPool().slice(0,15);
        userAnswers = {};
        renderQuestions();
        updateProgress();
        document.getElementById("resultModal").style.display = "none";
    }
    function updateProgress() {
        let answered = 0;
        currentExamQuestions.forEach(q => { if(userAnswers[q.id] && (userAnswers[q.id].answered || (userAnswers[q.id].userText?.trim()))) answered++; });
        document.getElementById("progressFill").style.width = (answered/currentExamQuestions.length)*100+"%";
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    function renderQuestions() {
        const area = document.getElementById("questionsArea");
        if(!currentExamQuestions.length){ area.innerHTML="<div style='text-align:center;padding:40px;'>No questions match filters.</div>"; return; }
        let html="";
        currentExamQuestions.forEach((q,idx)=>{
            const saved = userAnswers[q.id];
            const answered = saved && (saved.answered || saved.userText?.trim());
            let typeLabel = q.type==="mcq"?"MCQ":(q.type==="essay"?"Essay":"Report");
            html += `<div class="question-card" data-qid="${q.id}">
                        <div class="q-header">
                            <span class="q-badge">Question ${idx+1}</span>
                            <span class="q-type">${typeLabel}</span>
                            ${answered ? '<span style="color:#10b981;">✓ Answered</span>' : ''}
                        </div>
                        <div class="q-text">${escapeHtml(q.question)}</div>`;
            if(q.type==="mcq"){
                html += `<div class="options-list" data-qid="${q.id}">`;
                q.options.forEach((opt,optIdx)=>{
                    const letter = String.fromCharCode(65+optIdx);
                    const isCorrectChoice = (saved && saved.selectedOption===optIdx && saved.correct===true);
                    const isWrongChoice = (saved && saved.selectedOption===optIdx && saved.correct===false);
                    let extraClass = "";
                    if(isCorrectChoice) extraClass = "correct-answer";
                    if(isWrongChoice) extraClass = "wrong-answer";
                    html += `<div class="option-item ${extraClass}" data-opt="${optIdx}" tabindex="0" role="button">
                                <span class="option-prefix">${letter}</span>
                                <span>${escapeHtml(opt)}</span>
                            </div>`;
                });
                html += `</div><div class="feedback" id="fb-${q.id}"></div>`;
            } else {
                const savedText = saved?.userText || "";
                html += `<div class="${q.type==='essay'?'essay-area':'report-area'}">
                            <textarea id="ta-${q.id}" rows="4" placeholder="Write your answer here..." tabindex="0">${escapeHtml(savedText)}</textarea>
                            <button class="small-btn show-model" data-qid="${q.id}" tabindex="0">📖 Show Model Answer</button>
                            <div class="model-answer" id="model-${q.id}">${escapeHtml(q.answer || "Refer to academic resources.")}</div>
                            ${q.rubric ? `<div class="rubric">📋 Self-assessment rubric: ${escapeHtml(q.rubric)}</div>` : ''}
                            <button class="small-btn eval-essay" data-qid="${q.id}" tabindex="0">🔍 Self Evaluate (keywords)</button>
                            <div class="feedback" id="kf-${q.id}" style="margin-top:6px;"></div>
                        </div>`;
            }
            html += `</div>`;
        });
        area.innerHTML = html;
        attachEvents();
        attachKeyboardSelection();
    }

    function attachEvents() {
        document.querySelectorAll(".options-list").forEach(optList=>{
            const qid = parseInt(optList.getAttribute("data-qid"));
            const q = currentExamQuestions.find(qq=>qq.id===qid);
            if(!q || q.type!=="mcq") return;
            const opts = optList.querySelectorAll(".option-item");
            opts.forEach(opt=>{
                opt.removeEventListener("click", handleClick);
                opt.addEventListener("click", handleClick);
                function handleClick(){
                    if(userAnswers[qid]?.answered) return;
                    const selectedVal = parseInt(opt.getAttribute("data-opt"));
                    const isCorrect = (selectedVal === q.correct);
                    userAnswers[qid] = { answered: true, correct: isCorrect, selectedOption: selectedVal };
                    opts.forEach(oth=>{
                        const val = parseInt(oth.getAttribute("data-opt"));
                        if(val === q.correct) oth.classList.add("correct-answer");
                        else if(val === selectedVal && !isCorrect) oth.classList.add("wrong-answer");
                        oth.style.pointerEvents = "none";
                        oth.classList.add("disabled-option");
                    });
                    const fb = document.getElementById(`fb-${qid}`);
                    if(fb){
                        fb.innerHTML = `<div>📘 ${escapeHtml(q.explanation)} ✅ Correct answer: ${q.options[q.correct]}</div>`;
                        fb.classList.add(isCorrect ? "correct" : "wrong");
                    }
                    const card = opt.closest(".question-card");
                    const span = card.querySelector(".q-header span:last-child");
                    if(span) span.innerHTML = isCorrect ? "✓ Correct" : "✓ Answered";
                    updateProgress();
                }
            });
        });
        document.querySelectorAll("textarea").forEach(ta=>{
            const qid = parseInt(ta.id.split("-")[1]);
            ta.addEventListener("input",(e)=>{
                if(!userAnswers[qid]) userAnswers[qid] = {};
                userAnswers[qid].userText = e.target.value;
                updateProgress();
            });
        });
        document.querySelectorAll(".show-model").forEach(btn=>{
            btn.addEventListener("click",(e)=>{
                const qid = parseInt(btn.getAttribute("data-qid"));
                const modelDiv = document.getElementById(`model-${qid}`);
                if(modelDiv) modelDiv.style.display = modelDiv.style.display==="none"?"block":"none";
            });
        });
        document.querySelectorAll(".eval-essay").forEach(btn=>{
            btn.addEventListener("click",(e)=>{
                const qid = parseInt(btn.getAttribute("data-qid"));
                const ta = document.getElementById(`ta-${qid}`);
                const userText = ta?.value || "";
                const q = currentExamQuestions.find(qq=>qq.id===qid);
                if(!q || (q.type!=="essay" && q.type!=="report")) return;
                let keywords = (q.answer || "").toLowerCase().split(/[ ,.]+/).filter(w=>w.length>3);
                const unique = [...new Set(keywords)];
                const found = unique.filter(kw=>userText.toLowerCase().includes(kw));
                const percent = unique.length ? (found.length/unique.length)*100 : 0;
                const fbDiv = document.getElementById(`kf-${qid}`);
                if(fbDiv){
                    if(percent>60) fbDiv.innerHTML = `✅ Keyword match: ${Math.round(percent)}% – Good.`;
                    else if(percent>30) fbDiv.innerHTML = `⚠️ Match ${Math.round(percent)}%, add details.`;
                    else fbDiv.innerHTML = `❌ Low coverage. Important words: ${unique.slice(0,5).join(", ")}...`;
                    fbDiv.classList.add(percent>50?"correct":"wrong");
                }
            });
        });
    }
    function attachKeyboardSelection(){
        document.querySelectorAll(".option-item").forEach(opt=>{
            opt.setAttribute("tabindex","0");
            opt.addEventListener("keydown",(e)=>{
                if(e.key==="Enter"||e.key===" "){ e.preventDefault(); opt.click(); }
            });
        });
    }
    function evaluateExam(){
        let totalMCQ=0, correctMCQ=0;
        const mistakes=[];
        for(let q of currentExamQuestions){
            if(q.type==="mcq"){
                totalMCQ++;
                const ans = userAnswers[q.id];
                if(ans && ans.correct===true) correctMCQ++;
                else {
                    let userChoice = ans ? q.options[ans.selectedOption] : "Not answered";
                    mistakes.push({question:q.question, userChoice, correctAnswer:q.options[q.correct], explanation:q.explanation});
                }
            }
        }
        const score = totalMCQ ? Math.round((correctMCQ/totalMCQ)*100) : 0;
        document.getElementById("scorePercent").innerHTML = `${score}%`;
        let msg = (score>=85)?"🎉 Excellent!" : (score>=65)?"👍 Good, review mistakes." : "📚 Need more revision.";
        document.getElementById("scoreMsg").innerHTML = `Score: ${correctMCQ} / ${totalMCQ} (${score}%)<br>${msg}`;
        let mistakesHtml = "";
        if(mistakes.length){
            mistakesHtml = `<h4>❌ Mistakes (${mistakes.length})</h4>`;
            mistakes.forEach(m=>{
                mistakesHtml += `<div class="mistake-item"><strong>${escapeHtml(m.question)}</strong><br>Your answer: ${escapeHtml(m.userChoice)}<br>Correct: ${escapeHtml(m.correctAnswer)}<br><span style="font-size:0.8rem;">${escapeHtml(m.explanation)}</span></div>`;
            });
        } else mistakesHtml = `<p style="color:#10b981;">✨ No mistakes! Perfect.</p>`;
        document.getElementById("mistakesList").innerHTML = mistakesHtml;
        document.getElementById("resultModal").style.display = "flex";
    }

    function buildFilters(){
        const cats = [...new Set(FULL_BANK.map(q=>q.category))];
        const catContainer = document.getElementById("categoryFilters");
        catContainer.innerHTML = `<button class="filter-chip ${filterCategory==='all'?'active':''}" data-cat="all">All</button>`;
        cats.forEach(c=>{ catContainer.innerHTML += `<button class="filter-chip ${filterCategory===c?'active':''}" data-cat="${c}">${c}</button>`; });
        const types = ["all","mcq","essay","report"];
        const typeContainer = document.getElementById("typeFilters");
        typeContainer.innerHTML = "";
        types.forEach(t=>{
            let label = t==="all"?"All":(t==="mcq"?"MCQ":(t==="essay"?"Essay":"Report"));
            typeContainer.innerHTML += `<button class="filter-chip ${filterType===t?'active':''}" data-type="${t}">${label}</button>`;
        });
        document.querySelectorAll("[data-cat]").forEach(btn=>{ btn.addEventListener("click",()=>{ filterCategory=btn.getAttribute("data-cat"); buildFilters(); refreshExam(); }); });
        document.querySelectorAll("[data-type]").forEach(btn=>{ btn.addEventListener("click",()=>{ filterType=btn.getAttribute("data-type"); buildFilters(); refreshExam(); }); });
    }
    function resetFilters(){ filterCategory="all"; filterType="all"; buildFilters(); refreshExam(); }
    function setTheme(dark){ isDark=dark; if(dark) document.body.classList.add("dark"); else document.body.classList.remove("dark"); }

    document.getElementById("newExamBtn").onclick = () => refreshExam();
    document.getElementById("submitExamBtn").onclick = () => evaluateExam();
    document.getElementById("resetFiltersBtn").onclick = () => resetFilters();
    document.getElementById("closeResultBtn").onclick = () => document.getElementById("resultModal").style.display = "none";
    document.getElementById("newExamFromResultBtn").onclick = () => { document.getElementById("resultModal").style.display = "none"; refreshExam(); };
    document.getElementById("darkModeBtn").onclick = () => setTheme(true);
    document.getElementById("lightModeBtn").onclick = () => setTheme(false);

    buildFilters();
    refreshExam();
    setTheme(false);
</script>
